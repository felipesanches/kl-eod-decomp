<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Graphics Rendering Test</title>
    <style>
        body { background: #1a1a2e; color: #e0e0e0; font-family: sans-serif; padding: 2rem; }
        canvas, img { image-rendering: pixelated; border: 1px solid #444; margin: 0.5rem; }
        .row { display: flex; gap: 1rem; flex-wrap: wrap; margin: 1rem 0; }
        .col { text-align: center; }
        .col label { display: block; font-size: 0.8rem; color: #aaa; }
        #log { background: #0d1117; padding: 1rem; font-family: monospace; font-size: 0.8rem; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Graphics Rendering Diagnostic</h1>
    <p>Load the ROM to render V1 Breezegale and check for correctness.</p>
    <input type="file" id="rom-input" accept=".gba,.bin">
    <div id="output"></div>
    <h3>Console Log</h3>
    <div id="log"></div>

    <script type="module">
        import { decompressAsset } from './js/decompress.js';
        import { EXPECTED_SHA1, ROM_SIZE } from './js/rom-tables.js';
        import { composeBg, compositeLayers, renderBgLayer, renderScene, clearCache } from './js/gfx-render.js';

        const logEl = document.getElementById('log');
        function log(msg) { logEl.textContent += msg + '\n'; console.log(msg); }

        document.getElementById('rom-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const buf = await file.arrayBuffer();
            const rom = new Uint8Array(buf);
            const dv = new DataView(buf);
            log('ROM loaded: ' + rom.length + ' bytes');

            clearCache();
            const output = document.getElementById('output');
            output.innerHTML = '';

            // Test: V1 Breezegale (vision=1, world=1)
            const BG_TILE_TABLE = 0x189034;
            const BG_TILEMAP_TABLE = 0x1892BC;
            const BG_PALETTE_TABLE = 0x188F5C;

            // Render individual layers manually for diagnosis
            const palIdx = 0 * 9 + 1; // (vision-1)*9 + world = 1
            const palOff = dv.getUint32(BG_PALETTE_TABLE + palIdx * 4, true) - 0x08000000;
            const palResult = decompressAsset(rom, palOff);
            const palRaw = palResult.result.subarray(4);
            log('Palette: offset=0x' + palOff.toString(16) + ' decompSize=' + palResult.result.length + ' stripped=' + palRaw.length);

            const layerCanvases = [];
            for (let layer = 0; layer < 3; layer++) {
                const bgIdx = 0 * 27 + 1 * 3 + layer;
                const tileOff = dv.getUint32(BG_TILE_TABLE + bgIdx * 4, true) - 0x08000000;
                const tmapOff = dv.getUint32(BG_TILEMAP_TABLE + bgIdx * 4, true) - 0x08000000;

                const tileResult = decompressAsset(rom, tileOff);
                const tmapResult = decompressAsset(rom, tmapOff);
                const tiles = tileResult.result.subarray(4);
                const tilemap = tmapResult.result.subarray(4);

                const mapEntries = (tilemap.length / 2) | 0;
                let mapW, mapH;
                if (mapEntries >= 2048) { mapW = 64; mapH = 32; }
                else if (mapEntries >= 1024) { mapW = 32; mapH = 32; }
                else { mapW = 32; mapH = Math.max(1, (mapEntries / 32) | 0); }

                log('Layer ' + layer + ': tiles=' + tiles.length + ' tilemap=' + tilemap.length + ' (' + mapEntries + ' entries) -> ' + mapW + 'x' + mapH + ' = ' + (mapW*8) + 'x' + (mapH*8) + 'px');

                const canvas = composeBg(tiles, tilemap, palRaw, mapW, mapH);
                layerCanvases.push(canvas);

                if (canvas) {
                    // Check canvas pixel data
                    const ctx = canvas.getContext('2d');
                    const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                    const data = imgData.data;
                    let transparent = 0, opaque = 0, other = 0;
                    for (let i = 3; i < data.length; i += 4) {
                        if (data[i] === 0) transparent++;
                        else if (data[i] === 255) opaque++;
                        else other++;
                    }
                    log('  Canvas ' + canvas.width + 'x' + canvas.height + ': transparent=' + transparent + ' opaque=' + opaque + ' other_alpha=' + other);

                    // Check pixel (0,0)
                    const p0 = data.slice(0, 4);
                    log('  Pixel(0,0): rgba(' + p0[0] + ',' + p0[1] + ',' + p0[2] + ',' + p0[3] + ')');

                    // Display individual layer
                    const col = document.createElement('div');
                    col.className = 'col';
                    col.innerHTML = '<label>Layer ' + layer + ' (' + canvas.width + 'x' + canvas.height + ') - canvas</label>';
                    col.appendChild(canvas);
                    output.appendChild(col);

                    // Also show as img via toDataURL
                    const col2 = document.createElement('div');
                    col2.className = 'col';
                    const img = new Image();
                    img.src = canvas.toDataURL();
                    img.onload = () => {
                        // Read back from img via temp canvas
                        const tc = document.createElement('canvas');
                        tc.width = img.naturalWidth;
                        tc.height = img.naturalHeight;
                        const tctx = tc.getContext('2d');
                        tctx.drawImage(img, 0, 0);
                        const td = tctx.getImageData(0, 0, tc.width, tc.height).data;
                        let diffs = 0;
                        for (let i = 0; i < data.length; i++) {
                            if (Math.abs(data[i] - td[i]) > 1) diffs++;
                        }
                        log('  Layer ' + layer + ' toDataURL roundtrip: ' + diffs + ' differing bytes (of ' + data.length + ')');
                    };
                    col2.innerHTML = '<label>Layer ' + layer + ' - via toDataURL</label>';
                    col2.appendChild(img);
                    output.appendChild(col2);
                }
            }

            // Composite
            log('\nCompositing...');
            const composite = compositeLayers(layerCanvases);
            if (composite) {
                const ctx = composite.getContext('2d');
                const imgData = ctx.getImageData(0, 0, composite.width, composite.height);
                const data = imgData.data;

                // Check a few pixels
                for (const [x, y] of [[0,0], [100,100], [200,50]]) {
                    const p = (y * composite.width + x) * 4;
                    log('  Composite(' + x + ',' + y + '): rgba(' + data[p] + ',' + data[p+1] + ',' + data[p+2] + ',' + data[p+3] + ')');
                }

                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML = '<label>Composite (' + composite.width + 'x' + composite.height + ') - canvas</label>';
                col.appendChild(composite);
                output.appendChild(col);

                // Via toDataURL
                const col2 = document.createElement('div');
                col2.className = 'col';
                const img = new Image();
                img.src = composite.toDataURL();
                col2.innerHTML = '<label>Composite - via toDataURL</label>';
                col2.appendChild(img);
                output.appendChild(col2);
            }

            // Now test using the actual renderScene API path
            log('\nTesting renderScene API...');
            clearCache();
            const scene = renderScene(rom, dv, 1, 1);
            if (scene.composite) {
                const ctx = scene.composite.getContext('2d');
                const imgData = ctx.getImageData(0, 0, scene.composite.width, scene.composite.height);
                const data = imgData.data;
                log('renderScene composite: ' + scene.composite.width + 'x' + scene.composite.height);
                for (const [x, y] of [[0,0], [100,100], [200,50]]) {
                    const p = (y * scene.composite.width + x) * 4;
                    log('  (' + x + ',' + y + '): rgba(' + data[p] + ',' + data[p+1] + ',' + data[p+2] + ',' + data[p+3] + ')');
                }

                const col = document.createElement('div');
                col.className = 'col';
                col.innerHTML = '<label>renderScene composite</label>';
                col.appendChild(scene.composite);
                output.appendChild(col);
            } else {
                log('renderScene returned null composite!');
                log('Layers: ' + scene.layers.map((l,i) => 'L' + i + '=' + (l ? l.width + 'x' + l.height : 'null')).join(', '));
            }

            log('\nDone.');
        });
    </script>
</body>
</html>
